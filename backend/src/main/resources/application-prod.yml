spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

logging:
  level:
    root: WARN
    com.sabes.workflow.rule_engine: INFO

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
